version: '3.8'

services:
  # ------------------------------------------------------------------
  # Talk to Your Heart: DGX Spark Multi-Agent vLLM Deployment
  # ------------------------------------------------------------------
  
  nurse_agent_vllm:
    image: nvcr.io/nvidia/vllm:latest
    container_name: pulseforge_qwen3_nurse
    ports:
      - "8000:8000"
    volumes:
      - /models:/models
      - ./hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/Qwen2.5-72B-Instruct-AWQ
      --quantization awq
      --max-model-len 32768
      --gpu-memory-utilization 0.45
      --enable-prefix-caching
      --max-num-seqs 8

  duty_doctor_vllm:
    image: nvcr.io/nvidia/vllm:latest
    container_name: pulseforge_medgemma_doctor
    ports:
      - "8001:8001"
    volumes:
      - /models:/models
      - ./hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model /models/MedGemma-27B-IT
      --quantization awq
      --max-model-len 8192
      --gpu-memory-utilization 0.15
      --port 8001

  mqtt_broker:
    image: eclipse-mosquitto:latest
    container_name: pulseforge_mqtt_bus
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
